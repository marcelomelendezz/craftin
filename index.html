<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SOMOS · Crafteo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1a2e;user-select:none;}

/* PIXEL FONT */
:root{
  --px:'VT323',monospace;
  --bg:#1d1f21;
  --bg2:#2a2d30;
  --border:#555;
  --border2:#888;
  --gold:#ffd700;
  --green:#55ff55;
  --red:#ff5555;
}

#app{display:flex;flex-direction:column;width:100%;height:100%;
  background:linear-gradient(180deg,#1a1a2e 0%,#16213e 100%);
  image-rendering:pixelated;}

/* ── TOP BAR ── */
#topbar{
  flex-shrink:0;display:flex;align-items:center;gap:6px;
  padding:5px 8px;
  background:#2d2d2d;
  border-bottom:3px solid #555;
  box-shadow:0 3px 0 #111;
}
#topbar h1{font-family:'Press Start 2P',monospace;font-size:clamp(7px,2vw,10px);
  color:#55ff55;text-shadow:2px 2px #003300;letter-spacing:1px;}
#score-box{margin-left:auto;display:flex;gap:8px;align-items:center;}
.score-item{font-family:var(--px);font-size:clamp(13px,3.5vw,18px);color:#ffd700;
  display:flex;align-items:center;gap:3px;}

/* ── MAIN LAYOUT ── */
#main{flex:1;min-height:0;display:flex;flex-direction:row;overflow:hidden;}

/* ── LEFT: INVENTORY ── */
#inventory-panel{
  flex-shrink:0;width:clamp(130px,35vw,190px);
  background:#2d2d2d;border-right:3px solid #555;
  display:flex;flex-direction:column;overflow:hidden;
}
.panel-title{
  font-family:'Press Start 2P',monospace;font-size:clamp(5px,1.5vw,7px);
  color:#aaa;padding:6px 8px;background:#222;border-bottom:2px solid #444;
  letter-spacing:1px;
}
#inv-tabs{display:flex;border-bottom:2px solid #444;}
.inv-tab{
  flex:1;padding:4px;font-family:var(--px);font-size:clamp(11px,3vw,14px);
  text-align:center;cursor:pointer;background:#333;color:#888;
  border-right:2px solid #444;transition:all 0.1s;
}
.inv-tab:last-child{border-right:none;}
.inv-tab.active{background:#4a4a4a;color:#fff;}
.inv-tab:active{transform:scale(0.95);}

#inventory-grid{
  flex:1;overflow-y:auto;padding:5px;
  display:grid;grid-template-columns:repeat(4,1fr);gap:3px;
  align-content:start;
}
#inventory-grid::-webkit-scrollbar{width:4px;}
#inventory-grid::-webkit-scrollbar-thumb{background:#555;}

.inv-slot{
  aspect-ratio:1;border-radius:2px;cursor:pointer;
  background:#3a3a3a;border:2px solid #555;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;transition:all 0.08s;
  font-size:clamp(16px,4.5vw,22px);
}
.inv-slot:hover{border-color:#aaa;background:#484848;}
.inv-slot:active{transform:scale(0.93);}
.inv-slot.selected{border-color:#ffd700;background:#4a4500;
  box-shadow:0 0 0 1px #ffd700;}
.inv-slot .qty{
  position:absolute;bottom:1px;right:3px;
  font-family:var(--px);font-size:clamp(9px,2.5vw,13px);
  color:#fff;text-shadow:1px 1px #000,0 0 4px #000;
  line-height:1;
}
.inv-slot .iname{
  font-family:var(--px);font-size:clamp(6px,1.5vw,8px);
  color:#aaa;text-align:center;line-height:1;
  position:absolute;bottom:-1px;left:0;right:0;
  background:rgba(0,0,0,0.7);padding:1px;display:none;
}
.inv-slot:hover .iname{display:block;}

/* ── CENTER: CRAFTING TABLE ── */
#craft-panel{
  flex:1;min-width:0;display:flex;flex-direction:column;
  align-items:center;justify-content:flex-start;
  padding:8px 4px;gap:6px;overflow-y:auto;
}
#craft-panel::-webkit-scrollbar{width:3px;}

/* Crafting grid */
#craft-area{
  background:#2d2d2d;border:3px solid #555;border-radius:4px;
  padding:10px;display:flex;flex-direction:column;align-items:center;gap:8px;
  width:100%;max-width:300px;
  box-shadow:3px 3px 0 #111,inset 0 0 0 1px #444;
}
#craft-title{font-family:'Press Start 2P',monospace;font-size:clamp(6px,1.8vw,8px);
  color:#888;letter-spacing:1px;}

#craft-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:3px;width:100%;max-width:160px;
}
.craft-slot{
  aspect-ratio:1;border-radius:2px;cursor:pointer;
  background:#1a1a1a;border:2px solid #444;
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(18px,5vw,26px);
  position:relative;transition:all 0.08s;
  min-height:40px;
}
.craft-slot:hover{border-color:#888;}
.craft-slot:active{transform:scale(0.92);}
.craft-slot.filled{background:#2a2a1a;border-color:#666;}
.craft-slot .rm{
  position:absolute;top:-1px;right:-1px;
  width:14px;height:14px;background:#880000;border-radius:50%;
  font-size:9px;color:#fff;display:none;
  align-items:center;justify-content:center;
  line-height:1;font-weight:bold;border:1px solid #ff4444;
}
.craft-slot.filled:hover .rm{display:flex;}

/* Arrow + result */
#craft-row{display:flex;align-items:center;gap:10px;width:100%;justify-content:center;}
#craft-arrow{font-size:clamp(18px,5vw,24px);color:#888;}
#result-slot{
  width:clamp(52px,14vw,68px);height:clamp(52px,14vw,68px);
  border-radius:3px;background:#1a1a1a;border:3px solid #444;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:clamp(22px,6vw,30px);position:relative;
  cursor:pointer;transition:all 0.1s;
}
#result-slot.has-result{
  border-color:#ffd700;background:#2a2500;
  animation:pulse 1s ease infinite;
}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 #ffd70066;}50%{box-shadow:0 0 0 5px #ffd70000;}}
#result-slot .result-qty{
  position:absolute;bottom:1px;right:3px;
  font-family:var(--px);font-size:clamp(10px,2.8vw,14px);
  color:#fff;text-shadow:1px 1px #000;
}
#result-name{
  font-family:var(--px);font-size:clamp(11px,3vw,15px);
  color:#ffd700;text-align:center;min-height:20px;
}
#craft-btn{
  padding:8px 16px;border-radius:3px;cursor:pointer;
  font-family:'Press Start 2P',monospace;font-size:clamp(6px,1.8vw,8px);
  background:linear-gradient(180deg,#5a8a2a,#3a6a0a);
  border:2px solid #88cc44;color:#ddff88;
  box-shadow:0 3px 0 #1a4a00;letter-spacing:1px;
  transition:all 0.1s;
}
#craft-btn:active{transform:translateY(2px);box-shadow:0 1px 0 #1a4a00;}
#craft-btn:disabled{background:#444;border-color:#555;color:#777;cursor:default;
  box-shadow:0 3px 0 #222;}

/* Hint */
#craft-hint{
  font-family:var(--px);font-size:clamp(10px,2.8vw,14px);
  color:#666;text-align:center;min-height:20px;line-height:1.3;
}

/* ── RIGHT: RECIPES + CRAFTED ── */
#recipes-panel{
  flex-shrink:0;width:clamp(120px,32vw,180px);
  background:#2d2d2d;border-left:3px solid #555;
  display:flex;flex-direction:column;overflow:hidden;
}
#recipes-list{flex:1;overflow-y:auto;padding:4px;display:flex;flex-direction:column;gap:3px;}
#recipes-list::-webkit-scrollbar{width:3px;}
#recipes-list::-webkit-scrollbar-thumb{background:#555;}

.recipe-item{
  padding:5px 6px;border-radius:2px;cursor:pointer;
  background:#333;border:2px solid #444;
  display:flex;align-items:center;gap:5px;
  transition:all 0.08s;
}
.recipe-item:hover{background:#3d3d3d;border-color:#666;}
.recipe-item:active{transform:scale(0.97);}
.recipe-item.discovered{border-color:#4a4a00;}
.recipe-item.locked{opacity:0.4;cursor:default;}
.recipe-item .ri-icon{font-size:clamp(14px,4vw,18px);}
.recipe-item .ri-info{flex:1;min-width:0;}
.recipe-item .ri-name{font-family:var(--px);font-size:clamp(9px,2.5vw,12px);
  color:#ddd;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.recipe-item .ri-mats{font-family:var(--px);font-size:clamp(8px,2vw,10px);color:#888;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.recipe-item.discovered .ri-name{color:var(--gold);}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:#2d2d2d;border:2px solid var(--green);
  color:var(--green);font-family:var(--px);font-size:clamp(12px,3.5vw,16px);
  padding:8px 16px;border-radius:3px;
  box-shadow:3px 3px 0 #111;
  pointer-events:none;opacity:0;transition:opacity 0.2s;
  z-index:100;text-align:center;
}
#toast.show{opacity:1;}

/* ── SELECTED INDICATOR ── */
#selected-bar{
  flex-shrink:0;padding:3px 8px;background:#222;border-top:2px solid #444;
  font-family:var(--px);font-size:clamp(10px,2.8vw,14px);color:#aaa;
  min-height:24px;
}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <h1>⛏ CRAFTEO</h1>
    <div id="score-box">
      <div class="score-item">🧱 <span id="items-crafted">0</span></div>
      <div class="score-item">⭐ <span id="discovered-count">0</span>/60</div>
    </div>
  </div>

  <div id="main">
    <!-- INVENTORY -->
    <div id="inventory-panel">
      <div class="panel-title">INVENTARIO</div>
      <div id="inv-tabs">
        <div class="inv-tab active" data-tab="natural">🌿</div>
        <div class="inv-tab" data-tab="mineral">⛏</div>
        <div class="inv-tab" data-tab="special">✨</div>
        <div class="inv-tab" data-tab="crafted">🔨</div>
      </div>
      <div id="inventory-grid"></div>
      <div id="selected-bar">← toca un material</div>
    </div>

    <!-- CRAFT TABLE -->
    <div id="craft-panel">
      <div id="craft-area">
        <div id="craft-title">MESA DE CRAFTEO</div>
        <div id="craft-grid"></div>
        <div id="craft-row">
          <div id="craft-arrow">➜</div>
          <div id="result-slot"><span id="result-icon"></span><span class="result-qty" id="result-qty"></span></div>
        </div>
        <div id="result-name">?</div>
        <button id="craft-btn" disabled>CRAFTEAR</button>
      </div>
      <div id="craft-hint">Selecciona materiales del inventario<br>y colócalos en la cuadrícula</div>
    </div>

    <!-- RECIPES -->
    <div id="recipes-panel">
      <div class="panel-title">RECETAS</div>
      <div id="recipes-list"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>

// ══════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════
let inventory = {};
let craftGrid = Array(9).fill(null); // 3x3
let selectedMat = null;
let activeTab = 'natural';
let discovered = new Set();
let craftedTotal = 0;

// Init inventory
Object.entries(MATERIALS).forEach(([id,m])=>{
  inventory[id] = m.qty;
});

// ══════════════════════════════════════════════════════════
// INVENTORY UI
// ══════════════════════════════════════════════════════════
function buildInventory(){
  const grid = document.getElementById('inventory-grid');
  grid.innerHTML = '';
  const mats = Object.entries(MATERIALS)
    .filter(([id,m])=> m.tab === activeTab)
    .sort((a,b)=> b[1].qty - a[1].qty || a[1].name.localeCompare(b[1].name));

  mats.forEach(([id,m])=>{
    if(inventory[id] === 0 && activeTab !== 'crafted') return; // hide empty non-crafted
    const slot = document.createElement('div');
    slot.className = 'inv-slot' + (selectedMat===id?' selected':'');
    slot.innerHTML = `<span>${m.icon}</span><span class="qty">${inventory[id]}</span><span class="iname">${m.name}</span>`;
    if(inventory[id]===0) slot.style.opacity='0.35';
    slot.addEventListener('click',()=> selectMaterial(id));
    slot.addEventListener('touchstart',e=>{e.preventDefault();selectMaterial(id);},{passive:false});
    grid.appendChild(slot);
  });
}

function selectMaterial(id){
  if(inventory[id] <= 0){ showToast(`No tienes ${MATERIALS[id].name}`,'#ff5555'); return; }
  selectedMat = id;
  buildInventory();
  const m = MATERIALS[id];
  document.getElementById('selected-bar').textContent = `${m.icon} ${m.name}: ${inventory[id]} uds`;
}

document.querySelectorAll('.inv-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.inv-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    activeTab = tab.dataset.tab;
    buildInventory();
  });
});

// ══════════════════════════════════════════════════════════
// CRAFT GRID UI
// ══════════════════════════════════════════════════════════
function buildCraftGrid(){
  const grid = document.getElementById('craft-grid');
  grid.innerHTML = '';
  craftGrid.forEach((matId,i)=>{
    const slot = document.createElement('div');
    slot.className = 'craft-slot' + (matId?' filled':'');
    if(matId){
      const m = MATERIALS[matId];
      slot.innerHTML = `<span>${m?m.icon:'?'}</span><span class="rm">×</span>`;
      slot.querySelector('.rm').addEventListener('click',e=>{
        e.stopPropagation();
        removeCraftSlot(i);
      });
    }
    slot.addEventListener('click',()=> placeMaterial(i));
    slot.addEventListener('touchstart',e=>{e.preventDefault();
      if(matId){ removeCraftSlot(i); } else { placeMaterial(i); }
    },{passive:false});
    grid.appendChild(slot);
  });
  checkRecipe();
}

function placeMaterial(idx){
  if(!selectedMat){ showToast('Selecciona un material primero','#ffaa44'); return; }
  if(inventory[selectedMat] <= 0){ showToast('Sin existencias','#ff5555'); return; }
  craftGrid[idx] = selectedMat;
  buildCraftGrid();
}

function removeCraftSlot(idx){
  craftGrid[idx] = null;
  buildCraftGrid();
}

// ══════════════════════════════════════════════════════════
// RECIPE MATCHING
// ══════════════════════════════════════════════════════════
let currentRecipe = null;

function checkRecipe(){
  currentRecipe = null;
  const resultSlot = document.getElementById('result-slot');
  const resultIcon = document.getElementById('result-icon');
  const resultQty  = document.getElementById('result-qty');
  const resultName = document.getElementById('result-name');
  const craftBtn   = document.getElementById('craft-btn');
  const hintEl     = document.getElementById('craft-hint');

  // Try to match any recipe
  for(const recipe of RECIPES){
    if(matchesRecipe(craftGrid, recipe.pattern)){
      // Check if we have enough materials
      const needed = countNeeded(recipe.pattern);
      const canCraft = canMakeRecipe(needed);
      currentRecipe = recipe;
      resultSlot.className = 'result-slot has-result';
      resultIcon.textContent = recipe.result.icon;
      resultQty.textContent = recipe.result.qty > 1 ? '×'+recipe.result.qty : '';
      resultName.textContent = recipe.result.name;
      craftBtn.disabled = !canCraft;
      hintEl.textContent = canCraft ? `¡Listo para craftear!` : `Faltan materiales`;
      hintEl.style.color = canCraft ? '#55ff55' : '#ff5555';
      return;
    }
  }

  // No match
  resultSlot.className = 'result-slot';
  resultIcon.textContent = '';
  resultQty.textContent = '';
  resultName.textContent = '?';
  craftBtn.disabled = true;

  const filled = craftGrid.filter(Boolean).length;
  if(filled > 0){
    hintEl.textContent = 'No hay receta para esta combinación';
    hintEl.style.color = '#888';
  } else {
    hintEl.textContent = 'Coloca materiales en la cuadrícula';
    hintEl.style.color = '#666';
  }
}

function matchesRecipe(grid, pattern){
  // Exact match (position matters)
  for(let i=0;i<9;i++){
    const g = grid[i] || null;
    const p = pattern[i] || null;
    if(g !== p) return false;
  }
  return true;
}

function countNeeded(pattern){
  const count = {};
  pattern.forEach(m=>{ if(m){ count[m]=(count[m]||0)+1; } });
  return count;
}

function canMakeRecipe(needed){
  return Object.entries(needed).every(([id,qty])=> (inventory[id]||0) >= qty);
}

// ══════════════════════════════════════════════════════════
// CRAFT ACTION
// ══════════════════════════════════════════════════════════
document.getElementById('craft-btn').addEventListener('click', doCraft);

function doCraft(){
  if(!currentRecipe) return;
  const needed = countNeeded(currentRecipe.pattern);
  if(!canMakeRecipe(needed)){ showToast('No tienes suficientes materiales','#ff5555'); return; }

  // Consume materials
  Object.entries(needed).forEach(([id,qty])=>{ inventory[id] -= qty; });

  // Add result to crafted tab (special handling)
  const resultId = currentRecipe.result.name.toLowerCase().replace(/\s+/g,'_');
  // Just add as crafted item
  if(!MATERIALS[resultId]){
    MATERIALS[resultId] = {
      icon:currentRecipe.result.icon,
      name:currentRecipe.result.name,
      tab:'crafted', qty:0, desc:'Objeto crafteado'
    };
    inventory[resultId] = 0;
  }
  inventory[resultId] = (inventory[resultId]||0) + currentRecipe.result.qty;

  // Stats
  craftedTotal++;
  if(!discovered.has(currentRecipe.name)){
    discovered.add(currentRecipe.name);
    showToast(`✨ NUEVO: ${currentRecipe.result.icon} ${currentRecipe.result.name}!`,'#ffd700');
    updateRecipesList();
  } else {
    showToast(`${currentRecipe.result.icon} ${currentRecipe.result.name} crafteado!`,'#55ff55');
  }

  document.getElementById('items-crafted').textContent = craftedTotal;
  document.getElementById('discovered-count').textContent = discovered.size;

  // Clear grid
  craftGrid = Array(9).fill(null);
  buildCraftGrid();
  buildInventory();
}

// ══════════════════════════════════════════════════════════
// RECIPES LIST
// ══════════════════════════════════════════════════════════
function buildRecipesList(){
  const list = document.getElementById('recipes-list');
  list.innerHTML = '';
  RECIPES.forEach(r=>{
    const div = document.createElement('div');
    const isDisc = discovered.has(r.name);
    div.className = 'recipe-item' + (isDisc?' discovered':'');
    div.innerHTML = `
      <span class="ri-icon">${r.result.icon}</span>
      <div class="ri-info">
        <div class="ri-name">${isDisc ? r.result.name : '???'}</div>
        <div class="ri-mats">${isDisc ? r.category : '🔒 Sin descubrir'}</div>
      </div>`;
    if(isDisc){
      div.addEventListener('click',()=> loadRecipeHint(r));
      div.title = r.pattern.filter(Boolean).map(id=>MATERIALS[id]?.icon||'?').join('');
    }
    list.appendChild(div);
  });
}

function updateRecipesList(){
  document.querySelectorAll('.recipe-item').forEach((el,i)=>{
    const r = RECIPES[i];
    if(discovered.has(r.name)){
      el.className = 'recipe-item discovered';
      el.querySelector('.ri-name').textContent = r.result.name;
      el.querySelector('.ri-mats').textContent = r.category;
    }
  });
}

function loadRecipeHint(recipe){
  craftGrid = [...recipe.pattern];
  buildCraftGrid();
  showToast(`Receta cargada: ${recipe.result.name}`,'#aaaaff');
}

// ══════════════════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════════════════
let toastTimer;
function showToast(msg, color='#55ff55'){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = color;
  t.style.color = color;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}

// ══════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════
buildInventory();
buildCraftGrid();
buildRecipesList();
showToast('⛏ ¡Selecciona materiales y craftea!','#55ff55');
</script>
